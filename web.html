<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbrix - Minecraft Server</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}

  :root{
    --bg:#ffffff;
    --bg2:#f8f8f8;
    --bg3:#f2f2f2;
    --gold:#d4af37;
    --gold2:#f5d76e;
    --orange:#c9a227;
    --red:#b8860b;
    --text:#222222;
    --muted:#666666;
    --border:#d4af37;
    --card:#fffdf5;
  }

  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

  /* NAV */
  nav{justify-content:center;gap:40px;
    background:linear-gradient(135deg,#ffffff,#fff8e1);
    border-bottom:1px solid var(--border);
    padding:0 2rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:64px;
    position:sticky;
    top:0;
    z-index:100;
    backdrop-filter:blur(8px); box-shadow:0 2px 12px rgba(212,175,55,0.15);
  }
  .nav-logo img{height:80px;cursor:pointer;}
  .nav-links{display:flex;gap:4px;}
  .nav-btn{
    position:relative;
    background:transparent;
    border:none;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    letter-spacing:0.5px;
    padding:8px 18px;
    border-radius:6px;
    cursor:pointer;
    text-transform:uppercase;
    transition:all 0.2s;
  }
  .nav-btn:hover{color:var(--gold);}
.nav-btn::after{
content:'';
position:absolute;
left:0;
bottom:-4px;
width:0;
height:2px;
background:var(--gold);
transition:width .3s ease;
}
.nav-btn:hover::after,
.nav-btn.active::after{
width:100%;
}
  
.nav-btn.active{color:var(--gold);background:rgba(245,166,35,0.08);border-color:rgba(245,166,35,0.25);}

  /* PAGES */
  .page{display:none;min-height:calc(100vh - 64px);}
  .page.active{display:block;}

  /* HOME PAGE */
  .hero{
    text-align:center;
    padding:5rem 2rem 4rem;
    position:relative;
  }
  .hero-logo{height:180px;margin-bottom:2rem;filter:drop-shadow(0 0 40px rgba(245,166,35,0.3));}
  .hero-tagline{font-family:'Cinzel',serif;font-size:13px;letter-spacing:4px;color:var(--orange);text-transform:uppercase;margin-bottom:1rem;}
  .hero-desc{font-size:16px;color:var(--muted);max-width:500px;margin:0 auto 2.5rem;line-height:1.7;}
  .ip-box{
    display:inline-flex;align-items:center;gap:12px;
    background:var(--card);border:1px solid var(--border);
    border-radius:10px;padding:12px 20px;margin-bottom:3rem;
  }
  .ip-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .ip-text{font-family:monospace;font-size:16px;color:var(--gold);font-weight:600;}
  .ip-copy{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.2);color:var(--gold);font-size:12px;padding:5px 12px;border-radius:5px;cursor:pointer;transition:all 0.2s;}
  .ip-copy:hover{background:rgba(245,166,35,0.2);}

  /* INFO CARDS */
  .info-section{padding:0 2rem 4rem;max-width:900px;margin:0 auto;}
  .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:2rem;}
  .info-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;}
  .info-card-icon{font-size:28px;margin-bottom:12px;}
  .info-card h3{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;}
  .info-card p{font-size:13px;color:var(--muted);line-height:1.7;}
  .section-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:1rem;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .lore-text{font-size:14px;color:var(--muted);line-height:1.9;margin-bottom:1rem;}

  /* RANKS PAGE */
  .page-header{text-align:center;padding:3rem 2rem 2rem;}
  .page-header h1{font-family:'Cinzel',serif;font-size:28px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
  .page-header p{font-size:14px;color:var(--muted);}
  .ranks-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;padding:0 2rem 4rem;max-width:1000px;margin:0 auto;}
  .rank-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;text-align:center;transition:border-color 0.2s,transform 0.2s;}
  .rank-card:hover{transform:translateY(-3px);}
  .rank-card.featured{border-color:rgba(245,166,35,0.4);}
  .rank-gem{font-size:36px;margin-bottom:10px;}
  .rank-name{font-family:'Cinzel',serif;font-size:15px;font-weight:600;margin-bottom:4px;}
  .rank-price{font-size:22px;font-weight:600;margin-bottom:14px;}
  .rank-perks{list-style:none;text-align:left;font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
  .rank-perks li::before{content:"✦ ";color:var(--gold);font-size:10px;}
  .rank-buy{width:100%;padding:9px;border-radius:7px;border:1px solid;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;background:transparent;}
  .rank-buy:hover{opacity:0.8;}
  .pop-tag{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(245,166,35,0.15);color:var(--gold);border:1px solid rgba(245,166,35,0.3);margin-bottom:8px;letter-spacing:0.5px;}

  /* TEAM PAGE */
  .team-section{padding:0 2rem 4rem;max-width:800px;margin:0 auto;}
  .team-group{margin-bottom:2rem;}
  .team-group-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .team-group-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .team-member{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;}
  .member-avatar{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;}
  .member-info{flex:1;}
  .member-name{font-size:14px;font-weight:500;color:var(--text);}
  .member-role{font-size:12px;color:var(--muted);margin-top:2px;}
  .member-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}

  /* ONLINE PAGE */
  .online-section{padding:0 2rem 4rem;max-width:700px;margin:0 auto;}
  .online-header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
  .online-count{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);}
  .dot{width:8px;height:8px;border-radius:50%;background:#2ecc71;box-shadow:0 0 6px #2ecc71;}
  .online-count span{color:var(--text);font-weight:500;}
  .player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
  .player-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px;}
  .player-skin{width:32px;height:32px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .player-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .player-time{font-size:10px;color:var(--muted);margin-top:2px;}

  /* DIVIDER */
  .flame-divider{text-align:center;font-size:20px;letter-spacing:8px;color:var(--orange);margin:1.5rem 0;opacity:0.5;}

  /* RULES PAGE */
  .rules-section{padding:0 2rem 4rem;max-width:900px;margin:0 auto;}
  .rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:1.5rem;}
  .rule-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;transition:transform 0.2s,border-color 0.2s;}
  .rule-card:hover{transform:translateY(-3px);border-color:rgba(245,166,35,0.35);}
  .rule-icon{font-size:28px;margin-bottom:10px;}
  .rule-card h3{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
  .rule-list{list-style:none;color:var(--muted);font-size:13px;line-height:1.8;}
  .rule-list li{margin-bottom:7px;}
  .rule-list li::before{content:"✦ ";color:var(--gold);font-size:10px;}
  .rules-note{background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.25);border-radius:12px;padding:1rem 1.2rem;color:var(--muted);font-size:13px;line-height:1.7;text-align:center;}





  /* VOTE PAGE */
  .vote-section{padding:0 2rem 4rem;max-width:850px;margin:0 auto;}
  .vote-list{display:flex;flex-direction:column;gap:12px;margin-bottom:1.5rem;}
  .vote-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;}
  .vote-item:hover{transform:translateY(-2px);border-color:rgba(212,175,55,0.55);box-shadow:0 8px 22px rgba(212,175,55,0.14);}
  .vote-item h3{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
  .vote-item p{font-size:13px;color:var(--muted);line-height:1.6;}
  .vote-link{white-space:nowrap;display:inline-block;padding:9px 14px;border-radius:7px;border:1px solid var(--gold);color:var(--gold);text-decoration:none;font-size:13px;font-weight:600;transition:all .2s;background:transparent;}
  .vote-link:hover{background:rgba(212,175,55,0.12);}
  @media(max-width:600px){.vote-item{align-items:flex-start;flex-direction:column}.vote-link{width:100%;text-align:center}}




  /* NAV DROPDOWN SOCIAL MENU */
  .nav-social-dropdown{
    position:relative;
    display:flex;
    align-items:center;
    margin-left:10px;
  }
  .nav-social-toggle{
    width:48px;
    height:48px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    color:#111;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 18px rgba(212,175,55,0.28);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .nav-social-toggle:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 24px rgba(212,175,55,0.36);
  }
  .nav-social-toggle svg{
    width:24px;
    height:24px;
    stroke:#111;
  }
  .nav-social-menu{
    position:absolute;
    top:60px;
    right:0;
    display:flex;
    flex-direction:column;
    gap:10px;
    opacity:0;
    transform:translateY(-10px);
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:200;
  }
  .nav-social-menu.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  .nav-social-menu a{
    width:48px;
    height:48px;
    border-radius:50%;
    background:#fffdf5;
    border:1px solid var(--gold);
    color:var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    box-shadow:0 8px 18px rgba(212,175,55,0.16);
    transition:transform .25s ease, background .25s ease, color .25s ease;
  }
  .nav-social-menu a:hover{
    transform:translateY(-3px) scale(1.05);
    background:var(--gold);
    color:#111;
  }
  .nav-social-menu svg{
    width:22px;
    height:22px;
    fill:currentColor;
  }

/* footer */
  footer{text-align:center;padding:1.5rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border);}
</style>
</head>
